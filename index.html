<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sahil Dev Exam System</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<!-- ================= LOGIN ================= -->
<!-- ================= LOGIN ================= -->
<div id="loginBox">
  <h1>Sahil Dev</h1>
  <p>Exam Platform</p>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <input type="number" id="examTime" placeholder="Time (minutes)">

  <button id="loginBtn" onclick="login()">Start Exam</button>

  <button class="admin-btn" onclick="openAdmin()">
    Admin Login
  </button>
</div>

<!-- ================= QUIZ ================= -->
<div class="quiz-container">
  <div id="sidebar"></div>

  <div class="timer-bar">
    <div id="timeText">Time Left: 00:00</div>
    <div class="progress">
      <div id="progressFill"></div>
    </div>
  </div>

  <div class="top-bar">
    <h2>IT Exam</h2>
    <div id="qCounter"></div>
  </div>

  <div class="exam-box">
    <div id="question">Loading...</div>
    <div id="options"></div>

    <button id="backBtn">Back</button>
    <button id="nextBtn">Next</button>

    <button id="exitBtn" onclick="exitExam()" disabled>
      Exit Exam
    </button>
  </div>
</div>

<!-- ================= ADMIN MODAL ================= -->
<div id="adminModal" class="modal">
  <div class="modal-box">
    <h2>Admin Login</h2>

    <input type="email" id="adminEmail" placeholder="Admin Email">
    <input type="password" id="adminPass" placeholder="Password">

    <button onclick="adminLogin()">Login</button>
    <button class="close-btn" onclick="closeAdmin()">Cancel</button>
  </div>
</div>

<script type="module" src="main.js"></script>

    <div class="timer-bar">

  </div>
</div>

  <div class="top-bar">
    <h2>IT Exam</h2>

    <div id="options"></div>

    <button id="nextBtn">Next</button>
    <div class="controls">

</div>

</div>


<script type="module" src="main.js"></script>

</body>
</html>
